<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>NewH Map – Zoom 9 und 10</title>

    <!-- Leaflet CSS -->
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet/dist/leaflet.css"
    />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Karte für Zoom 9–10
    var map = L.map('map', {
        minZoom: 9,
        maxZoom: 10
    }).setView([44.0, -71.0], 9);

    // Tile-Layer (nur deine 11er Tiles skaliert)
    L.tileLayer('tiles/{x}/{y}.png', {
        tileSize: 256,
        minZoom: 9,
        maxZoom: 10,
        attribution: '© Simon D DFr'
    }).addTo(map);
</script>

</body>
</html>
