<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>NH Map – Zoom 7, 8 9 und 10</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
</style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// =========================
// Großzügige NH-Bounding-Box
// =========================
var bounds = L.latLngBounds(
    [40.00, -77.00],   // Süd-West (großzügiger)
    [48.00, -70.30]    // Nord-Ost (großzügiger)
);

// =========================
// Karte initialisieren
// =========================
var map = L.map('map', {
    minZoom: 7,
    maxZoom: 10,
    maxBounds: bounds,
    maxBoundsViscosity: 1.0,
    zoomControl: true
}).setView([44.0, -71.3], 9);

    // =========================
// Tiles für Zoom 7
// =========================
L.tileLayer('tiles/7/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 7,
    maxZoom: 7,
    attribution: '© Simon'
}).addTo(map);


    // =========================
// Tiles für Zoom 8
// =========================
L.tileLayer('tiles/8/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 8,
    maxZoom: 8,
    attribution: '© Simon'
}).addTo(map);


// =========================
// Tiles für Zoom 9
// =========================
L.tileLayer('tiles/9/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 9,
    maxZoom: 9,
    attribution: '© Simon'
}).addTo(map);

// =========================
// Tiles für Zoom 10
// =========================
L.tileLayer('tiles/10/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 10,
    maxZoom: 10,
    attribution: '© Simon'
}).addTo(map);

</script>

</body>
</html>
