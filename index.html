<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>NH Map – Zoom 7, 8, 9 und 10</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }

    /* Control-Box */
    #controls {
        position:absolute;
        top:10px;
        left:10px;
        z-index:9999;
        background:white;
        padding:10px;
        border-radius:6px;
        box-shadow:0 0 5px rgba(0,0,0,0.3);
    }
</style>
</head>
<body>

<div id="map"></div>

<!-- Overlay Control UI -->
<div id="controls">
    <label>
        <input type="checkbox" id="rumseyToggle">
        Historische Karte einblenden
    </label>

    <br><br>

    Transparenz:
    <input type="range" id="rumseyOpacity" min="0" max="1" step="0.05" value="0.6">
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// =========================
// Bounding Box
// =========================
var bounds = L.latLngBounds(
    [42.00, -74.00],   // Süd-West
    [46.00, -69.30]    // Nord-Ost
);

// =========================
// Karte initialisieren
// =========================
var map = L.map('map', {
    minZoom: 7,
    maxZoom: 10,
    maxBounds: bounds,
    maxBoundsViscosity: 1.0,
    zoomControl: true
}).setView([44.0, -71.3], 9);

// =========================
// Tiles für Zoom 7
// =========================
L.tileLayer('tiles/7/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 7,
    maxZoom: 7,
    attribution: '© Simon'
}).addTo(map);

// =========================
// Tiles für Zoom 8
// =========================
L.tileLayer('tiles/8/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 8,
    maxZoom: 8,
    attribution: '© Simon'
}).addTo(map);

// =========================
// Tiles für Zoom 9
// =========================
L.tileLayer('tiles/9/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 9,
    maxZoom: 9,
    attribution: '© Simon'
}).addTo(map);

// =========================
// Tiles für Zoom 10
// =========================
L.tileLayer('tiles/10/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 10,
    maxZoom: 10,
    attribution: '© Simon'
}).addTo(map);

// =========================================================
// Historische Karte als ImageOverlay (NICHT georeferenziert)
// =========================================================
//
// Bildpfad:
// https://github.com/SiFraPaz/nh_maps/blob/main/overlays/3251002.jpg
//
// Wir platzieren es grob über New Hampshire —
// du kannst die vier Koordinaten später anpassen.
//
var rumseyOverlay = L.imageOverlay(
    'overlays/3251002.jpg',
    [
        [46.0, -74.0],   // Nord-West
        [42.0, -69.3]    // Süd-Ost
    ],
    { opacity: 0.6 }
);

// === Checkbox: Overlay ein/aus ===
document.getElementById("rumseyToggle").addEventListener("change", function(e){
    if (e.target.checked) {
        rumseyOverlay.addTo(map);
    } else {
        map.removeLayer(rumseyOverlay);
    }
});

// === Transparenz-Regler ===
document.getElementById("rumseyOpacity").addEventListener("input", function(e){
    rumseyOverlay.setOpacity(e.target.value);
});
</script>

</body>
</html><!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>NH Map – Zoom 7, 8, 9 und 10</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }

    /* Control-Box */
    #controls {
        position:absolute;
        top:10px;
        left:10px;
        z-index:9999;
        background:white;
        padding:10px;
        border-radius:6px;
        box-shadow:0 0 5px rgba(0,0,0,0.3);
    }
</style>
</head>
<body>

<div id="map"></div>

<!-- Overlay Control UI -->
<div id="controls">
    <label>
        <input type="checkbox" id="rumseyToggle">
        Historische Karte einblenden
    </label>

    <br><br>

    Transparenz:
    <input type="range" id="rumseyOpacity" min="0" max="1" step="0.05" value="0.6">
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// =========================
// Großzügige NH-Bounding-Box
// =========================
var bounds = L.latLngBounds(
    [42.00, -74.00],   // Süd-West
    [46.00, -69.30]    // Nord-Ost
);

// =========================
// Karte initialisieren
// =========================
var map = L.map('map', {
    minZoom: 7,
    maxZoom: 10,
    maxBounds: bounds,
    maxBoundsViscosity: 1.0,
    zoomControl: true
}).setView([44.0, -71.3], 9);

// =========================
// Tiles für Zoom 7
// =========================
L.tileLayer('tiles/7/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 7,
    maxZoom: 7,
    attribution: '© Simon'
}).addTo(map);

// =========================
// Tiles für Zoom 8
// =========================
L.tileLayer('tiles/8/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 8,
    maxZoom: 8,
    attribution: '© Simon'
}).addTo(map);

// =========================
// Tiles für Zoom 9
// =========================
L.tileLayer('tiles/9/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 9,
    maxZoom: 9,
    attribution: '© Simon'
}).addTo(map);

// =========================
// Tiles für Zoom 10
// =========================
L.tileLayer('tiles/10/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 10,
    maxZoom: 10,
    attribution: '© Simon'
}).addTo(map);

// =========================================================
// Rumsey-Historische Karte (über Allmaps als IIIF-TileLayer)
// =========================================================
//
// DEIN FUNKTIONIERENDER MANIFEST-LINK:
// https://www.davidrumsey.com/luna/servlet/iiif/m/RUMSEY~8~1~376948~90141681/manifest
//
// Allmaps-URL:
//
var rumsey = L.tileLayer(
  "https://iiif.allmaps.org/tiles/{z}/{x}/{y}.png?manifest=" +
  "https://www.davidrumsey.com/luna/servlet/iiif/m/RUMSEY~8~1~376948~90141681/manifest",
  {
    opacity: 0.6,
    zIndex: 550
  }
);

// Toggle: historische Karte ein/aus
document.getElementById("rumseyToggle").addEventListener("change", function(e){
    if (e.target.checked) {
        rumsey.addTo(map);
    } else {
        map.removeLayer(rumsey);
    }
});

// Transparenz-Regler
document.getElementById("rumseyOpacity").addEventListener("input", function(e){
    rumsey.setOpacity(e.target.value);
});
</script>

</body>
</html>
