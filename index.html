<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>NH Map – begrenzt</title>

    https://unpkg.com/leaflet/dist/leaflet.css

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

https://unpkg.com/leaflet/dist/leaflet.js

<script>
    // GRENZEN des Kartenausschnitts
    var bounds = L.latLngBounds(
        [42.5, -72.5],   // südwestliche Ecke
        [44.5, -70.5]    // nordöstliche Ecke
    );

    // Karte initialisieren – nur Zoom 9 bis 10
    var map = L.map('map', {
        minZoom: 9,
        maxZoom: 10,
        maxBounds: bounds,        // <- WICHTIG!
        maxBoundsViscosity: 1.0,  // stoppt das Verschieben komplett
        zoomControl: true
    }).setView([44.0, -71.0], 9);

    // TILE-LAYER – wir nutzen nur /11/
    L.tileLayer('tiles/11/{x}/{y}.png', {
        tileSize: 256,
        minZoom: 9,
        maxZoom: 10,
        attribution: '© Simon'
    }).addTo(map);
</script>

</body>
</html>
