<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>NH Map – Zoom 9 bis 11</title>

    <!-- Leaflet CSS -->
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Karte initialisieren
    var map = L.map('map', {
        minZoom: 9,
        maxZoom: 11,
        zoomControl: true
    }).setView([44.0, -71.0], 10);

    // EIN TileLayer für alle Zoomstufen, aber gespeist aus deinem /11/ Ordner
    L.tileLayer('tiles/11/{x}/{y}.png', {
        tileSize: 256,
        minZoom: 9,
        maxZoom: 11,
        attribution: '© Simon Franzen'
    }).addTo(map);
</script>

</body>
</html>
