<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>NH Map – Zoom 9 und 10</title>

    <!-- Leaflet CSS -->
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Karte initialisieren – Zoom 9 bis 10
    var map = L.map('map', {
        minZoom: 9,
        maxZoom: 10,
        zoomControl: true
    }).setView([44.0, -71.0], 9);

    // Tile-Layer für Zoom 9
    var tiles9 = L.tileLayer('tiles/9/{x}/{y}.png', {
        tileSize: 256,
        minZoom: 9,
        maxZoom: 9,
        attribution: '© Simon'
    });

    // Tile-Layer für Zoom 10
    var tiles10 = L.tileLayer('tiles/10/{x}/{y}.png', {
        tileSize: 256,
        minZoom: 10,
        maxZoom: 10,
        attribution: '© SimonIren'
    });

    // Beide Layer zur Karte hinzufügen — Leaflet wählt automatisch den passenden je nach Zoom
    map.addLayer(tiles9);
    map.addLayer(tiles10);
</script>

</body>
</html>
