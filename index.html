<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>NewHampshire Map – Zoom 7, 8, 9 und 10</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }

    /* Control-Box */
    #controls {
        position:absolute;
        top:10px;
        left:10px;
        z-index:9999;
        background:white;
        padding:10px;
        border-radius:6px;
        box-shadow:0 0 5px rgba(0,0,0,0.3);
        font-family: sans-serif;
        font-size: 14px;
    }

    /* Eleganter Footer – standardmäßig unsichtbar */
    #footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(4px);
        font-family: sans-serif;
        font-size: 14px;
        padding: 6px 12px;
        text-align: center;
        box-shadow: 0 -2px 6px rgba(0,0,0,0.15);
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    #footer a {
        color: #004a9f;
        text-decoration: none;
        font-weight: 600;
    }

    #footer a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div id="map"></div>

<!-- Overlay Control UI -->
<div id="controls">
    <label>
        <input type="checkbox" id="rumseyToggle">
        Historische Karte einblenden
    </label>

    <br><br>

    Transparenz:
    <input type="range" id="rumseyOpacity" min="0" max="1" step="0.05" value="0.6">
</div>

<!-- Footer -->
<div id="footer">
    Historische Karte: 
    <a href="https://www.davidrumsey.com/luna/servlet/detail/RUMSEY~8~1~376948~90141681" target="_blank">
        Scarborough’s Map of New Hampshire (1784)
    </a>
    – © David Rumsey Map Collection, David Rumsey Map Center, Stanford Libraries
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// =========================
// Bounding Box
// =========================
var bounds = L.latLngBounds(
    [42.00, -74.00],   // Süd-West
    [46.00, -69.30]    // Nord-Ost
);

// =========================
// Karte initialisieren
// =========================
var map = L.map('map', {
    minZoom: 7,
    maxZoom: 10,
    maxBounds: bounds,
    maxBoundsViscosity: 1.0,
    zoomControl: true
}).setView([44.0, -71.3], 9);

// Attribution gemäß Rumsey-Lizenzbedingungen
map.attributionControl.addAttribution(
    'Historische Karte © David Rumsey Map Collection, David Rumsey Map Center, Stanford Libraries'
);

// Tile-Layer
L.tileLayer('tiles/7/{x}/{y}.png', { tileSize:256, minZoom:7, maxZoom:7, attribution:'© Simon' }).addTo(map);
L.tileLayer('tiles/8/{x}/{y}.png', { tileSize:256, minZoom:8, maxZoom:8, attribution:'© Simon' }).addTo(map);
L.tileLayer('tiles/9/{x}/{y}.png', { tileSize:256, minZoom:9, maxZoom:9, attribution:'© Simon' }).addTo(map);
L.tileLayer('tiles/10/{x}/{y}.png', { tileSize:256, minZoom:10, maxZoom:10, attribution:'© Simon' }).addTo(map);

// =========================================================
// Historische Rumsey-Karte
// =========================================================
var rumseyOverlay = L.imageOverlay(
    'overlays/3251002.jpg',
    [
        [46.0, -74.0],   // Nord-West
        [42.0, -69.3]    // Süd-Ost
    ],
    { 
        opacity: 0.6,
        attribution: 'Historische Karte © David Rumsey Map Collection, David Rumsey Map Center, Stanford Libraries'
    }
);

// Footer-Element referenzieren
let footer = document.getElementById("footer");

// === Checkbox: Overlay ein/aus ===
document.getElementById("rumseyToggle").addEventListener("change", function(e){
    if (e.target.checked) {
        rumseyOverlay.addTo(map);
        footer.style.opacity = "1";
        footer.style.pointerEvents = "auto";
    } else {
        map.removeLayer(rumseyOverlay);
        footer.style.opacity = "0";
        footer.style.pointerEvents = "none";
    }
});

// === Transparenz-Regler ===
document.getElementById("rumseyOpacity").addEventListener("input", function(e){
    rumseyOverlay.setOpacity(e.target.value);
});
</script>

</body>
</html>
