<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>NH Map – Zoom 9 und 10</title>

    <!-- Leaflet CSS -->
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Karte initialisieren – nur Zoom 9 und 10
    var map = L.map('map', {
        minZoom: 9,
        maxZoom: 10,
        zoomControl: true
    }).setView([44.0, -71.0], 9);

    // TILE-LAYER: Wir nutzen NUR die Kacheln aus /11/
    // Leaflet skaliert sie sauber herunter und zeigt Zoom 9 und 10 korrekt an.
    L.tileLayer('tiles/{x}/{y}.png', {
        tileSize: 256,
        minZoom: 9,
        maxZoom: 10,
        attribution: '© Simon D. Franzen'
    }).addTo(map);
</script>

</body>
</html>
