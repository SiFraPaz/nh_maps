<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>NH Map – Zoom 9 und 10</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
</style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// =========================
// Exakte NH-Grenzen
// =========================
var bounds = L.latLngBounds(
    [42.70, -72.56],   // Süd-West
    [45.31, -70.61]    // Nord-Ost
);

// =========================
// Karte initialisieren
// =========================
var map = L.map('map', {
    minZoom: 9,
    maxZoom: 10,
    maxBounds: bounds,
    maxBoundsViscosity: 1.0,  // verhindert Herausziehen
    zoomControl: true
}).setView([44.0, -71.3], 9);

// =========================
// Tiles für Zoom 9 und 10
// =========================
L.tileLayer('tiles/9/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 9,
    maxZoom: 9,
    attribution: '© Simon D. Franzen (2026)'
}).addTo(map);

L.tileLayer('tiles/10/{x}/{y}.png', {
    tileSize: 256,
    minZoom: 10,
    maxZoom: 10,
    attribution: '© Simon D. Franzen (2026)'
}).addTo(map);

</script>

</body>
</html>
